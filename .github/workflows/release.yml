name: Build & Release VaultMate

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

# ─────────────────────────────────────────────────
# Determine version from tag or manual input
# ─────────────────────────────────────────────────
env:
  VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.version }}

jobs:
  # ══════════════════════════════════════════════
  # LINUX — produces VaultMate-v*-linux-x86_64.tar.gz
  # ══════════════════════════════════════════════
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libsecret-1-dev \
            libdbus-glib-1-dev pkg-config

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Bundle native host
        working-directory: Application
        run: |
          cp native_host.py dist/VaultMate/
          cat > dist/VaultMate/native_host.sh << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          SHEOF
          chmod +x dist/VaultMate/native_host.sh

      - name: Package tar.gz
        run: |
          VERSION="${{ env.VERSION }}"
          cd Application/dist
          tar -czf "../../VaultMate-${VERSION}-linux-x86_64.tar.gz" VaultMate/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: VaultMate-*-linux-x86_64.tar.gz

  # ══════════════════════════════════════════════
  # WINDOWS — produces VaultMate-Setup-v*-windows.msi
  # ══════════════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows MSI
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      # ── Ensure WiX Toolset v3 is available ────────────────────────────────
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          # Use already-installed version if present, otherwise install latest
          $wix = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) {
            Write-Host "✅ WiX already installed at $($wix.FullName)"
          } else {
            choco install wixtoolset -y --no-progress
          }

      # ── Convert plain-text LICENSE → LICENSE.rtf (WiX requires RTF) ────────
      - name: Convert LICENSE to RTF
        shell: pwsh
        run: |
          $txt = Get-Content LICENSE -Raw
          $e = $txt -replace '\\','\\' -replace '\{','\{' -replace '\}','\}'
          $e = $e -replace "`r`n",'\par ' -replace "`n",'\par '
          "{{\rtf1\ansi\deff0{{\fonttbl{{\f0 Courier New;}}}}\f0\fs18 $e}" |
            Set-Content LICENSE.rtf -Encoding ASCII
          Write-Host "✅ LICENSE.rtf created"

      # ── Compile + Link with WiX → .msi ────────────────────────────────────
      - name: Build MSI
        shell: pwsh
        env:
          VAULTMATE_VERSION: ${{ env.VERSION }}
        run: |
          $ver = $env:VAULTMATE_VERSION -replace '^v',''
          # WiX requires x.x.x.x (4-part) version — pad 3-part semver with .0
          $wixVer = if ($ver -match '^\d+\.\d+\.\d+$') { "$ver.0" } else { $ver }
          $env:VAULTMATE_VERSION = $wixVer
          Write-Host "Version (semver): $ver  |  Version (WiX): $wixVer"
          # Find WiX bin dynamically (handles any installed patch version)
          $wixDir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" | Select-Object -First 1
          $bin = Join-Path $wixDir.FullName "bin"
          Write-Host "Using WiX at: $bin"

          # Compile .wxs → .wixobj
          & "$bin\candle.exe" -nologo -arch x64 `
            -ext WixUIExtension -ext WixUtilExtension `
            installer\vaultmate.wxs -out installer\vaultmate.wixobj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Link .wixobj → .msi
          & "$bin\light.exe" -nologo `
            -ext WixUIExtension -ext WixUtilExtension `
            -cultures:en-us `
            installer\vaultmate.wixobj `
            -out "VaultMate-Setup-v${ver}-windows.msi"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $out = "VaultMate-Setup-v${ver}-windows.msi"
          if (Test-Path $out) {
            Write-Host "✅ MSI created: $out"
          } else {
            Write-Error "❌ MSI not found"; exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VaultMate-Setup-*.msi

  # ══════════════════════════════════════════════
  # MACOS — produces VaultMate-v*-macOS-arm64.dmg
  # ══════════════════════════════════════════════
  build-macos:
    name: 🍎 Build macOS DMG
    runs-on: macos-14   # Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Embed native host into .app
        working-directory: Application
        run: |
          RESOURCES="dist/VaultMate.app/Contents/Resources"
          mkdir -p "$RESOURCES"
          cp native_host.py "$RESOURCES/"
          cat > "$RESOURCES/native_host.sh" << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          SHEOF
          chmod +x "$RESOURCES/native_host.sh"

      - name: Create DMG
        run: |
          VERSION="${{ env.VERSION }}"
          ARCH="$(uname -m)"
          DMG="VaultMate-${VERSION}-macOS-${ARCH}.dmg"
          create-dmg \
            --volname "VaultMate" \
            --volicon "Application/icon256.png" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --icon "VaultMate.app" 175 180 \
            --hide-extension "VaultMate.app" \
            --app-drop-link 420 180 \
            "$DMG" \
            "Application/dist/VaultMate.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: VaultMate-*-macOS-*.dmg

  # ══════════════════════════════════════════════
  # RELEASE — attach all 3 to a GitHub Release
  # ══════════════════════════════════════════════
  release:
    name: 📦 Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaultMate ${{ env.VERSION }}"
          body: |
            ## 🔐 VaultMate ${{ env.VERSION }}

            ### ⬇️ Direct Downloads

            | Platform | Download | Notes |
            |---|---|---|
            | 🐧 **Linux** (x86_64) | `VaultMate-${{ env.VERSION }}-linux-x86_64.tar.gz` | Extract & run `./VaultMate` |
            | 🪟 **Windows** (10/11) | `VaultMate-Setup-${{ env.VERSION }}-windows.msi` | Double-click → installs Python if needed, downloads & builds VaultMate automatically |
            | 🍎 **macOS** (12+) | `VaultMate-${{ env.VERSION }}-macOS-arm64.dmg` | Open DMG → drag to Applications |

            ### 🦊 Firefox Extension (Fully Tested ✅)
            Load `extension-firefox/` via `about:debugging` in Firefox.

            ### 🔗 After Installing
            Open VaultMate → click **Browser Integrations** → **Add +** to connect your browser.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: release-assets/*
