name: Build & Release VaultMate

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

# ─────────────────────────────────────────────────
# Determine version from tag or manual input
# ─────────────────────────────────────────────────
env:
  VERSION: ${{ github.ref_name || inputs.version }}

jobs:
  # ══════════════════════════════════════════════
  # LINUX — produces VaultMate-v*-linux-x86_64.tar.gz
  # ══════════════════════════════════════════════
  build-linux:
    name: 🐧 Build Linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk libsecret-1-dev \
            libdbus-glib-1-dev pkg-config

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Bundle native host
        working-directory: Application
        run: |
          cp native_host.py dist/VaultMate/
          cat > dist/VaultMate/native_host.sh << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          SHEOF
          chmod +x dist/VaultMate/native_host.sh

      - name: Package tar.gz
        run: |
          VERSION="${{ env.VERSION }}"
          cd Application/dist
          tar -czf "../../VaultMate-${VERSION}-linux-x86_64.tar.gz" VaultMate/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: VaultMate-*-linux-x86_64.tar.gz

  # ══════════════════════════════════════════════
  # WINDOWS — produces VaultMate-Setup-v*-windows.exe
  # ══════════════════════════════════════════════
  build-windows:
    name: 🪟 Build Windows Installer
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Bundle native host
        working-directory: Application
        shell: pwsh
        run: |
          Copy-Item native_host.py dist\VaultMate\
          # Windows native host wrapper batch file
          Set-Content dist\VaultMate\native_host.bat '@echo off
          set "DIR=%~dp0"
          "%DIR%native_host.exe" %* 2>nul || python "%DIR%native_host.py" %*'

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        env:
          VAULTMATE_VERSION: ${{ env.VERSION }}
        run: |
          $version = $env:VAULTMATE_VERSION
          # Patch version into NSI
          $nsi = Get-Content installer\vaultmate.nsi -Raw
          $nsi = $nsi -replace '\$%VAULTMATE_VERSION%', $version
          Set-Content installer\vaultmate_patched.nsi $nsi
          # Run makensis from the repo root so relative paths work
          & "C:\Program Files (x86)\NSIS\makensis.exe" /V2 installer\vaultmate_patched.nsi
          # Rename output to include version
          $out = "VaultMate-Setup-${version}-windows.exe"
          Move-Item "VaultMate-Setup-${version}-windows.exe" $out -ErrorAction SilentlyContinue
          Get-ChildItem *.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VaultMate-Setup-*.exe

  # ══════════════════════════════════════════════
  # MACOS — produces VaultMate-v*-macOS-arm64.dmg
  # ══════════════════════════════════════════════
  build-macos:
    name: 🍎 Build macOS DMG
    runs-on: macos-14   # Apple Silicon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python deps
        working-directory: Application
        run: pip install -r requirements.txt pyinstaller pillow

      - name: PyInstaller build
        working-directory: Application
        run: pyinstaller vaultmate.spec --clean --noconfirm

      - name: Embed native host into .app
        working-directory: Application
        run: |
          RESOURCES="dist/VaultMate.app/Contents/Resources"
          mkdir -p "$RESOURCES"
          cp native_host.py "$RESOURCES/"
          cat > "$RESOURCES/native_host.sh" << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec python3 "$DIR/native_host.py" "$@"
          SHEOF
          chmod +x "$RESOURCES/native_host.sh"

      - name: Create DMG
        run: |
          VERSION="${{ env.VERSION }}"
          ARCH="$(uname -m)"
          DMG="VaultMate-${VERSION}-macOS-${ARCH}.dmg"
          create-dmg \
            --volname "VaultMate" \
            --volicon "Application/icon256.png" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 100 \
            --icon "VaultMate.app" 175 180 \
            --hide-extension "VaultMate.app" \
            --app-drop-link 420 180 \
            "$DMG" \
            "Application/dist/VaultMate.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: VaultMate-*-macOS-*.dmg

  # ══════════════════════════════════════════════
  # RELEASE — attach all 3 to a GitHub Release
  # ══════════════════════════════════════════════
  release:
    name: 📦 Publish Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaultMate ${{ env.VERSION }}"
          body: |
            ## 🔐 VaultMate ${{ env.VERSION }}

            ### ⬇️ Direct Downloads

            | Platform | Download | Notes |
            |---|---|---|
            | 🐧 **Linux** (x86_64) | `VaultMate-${{ env.VERSION }}-linux-x86_64.tar.gz` | Extract & run `./VaultMate` |
            | 🪟 **Windows** (10/11) | `VaultMate-Setup-${{ env.VERSION }}-windows.exe` | Run installer → Desktop shortcut created |
            | 🍎 **macOS** (12+) | `VaultMate-${{ env.VERSION }}-macOS-arm64.dmg` | Open DMG → drag to Applications |

            ### 🦊 Firefox Extension (Fully Tested ✅)
            Load `extension-firefox/` via `about:debugging` in Firefox.

            ### 🔗 After Installing
            Open VaultMate → click **Browser Integrations** → **Add +** to connect your browser.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: release-assets/*
